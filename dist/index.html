<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genetic Aquarium</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #06192e;
        overflow: hidden;
      }
      canvas {
        display: block;
      }

      /* ── Gizmo List Panel ─────────────────────────────────────────────────── */
      #gizmo-list-panel {
        position: fixed;
        left: 0;
        top: 0;
        width: 175px;
        height: 100vh;
        background: rgba(10, 20, 40, 0.95);
        border-right: 2px solid rgba(0, 255, 231, 0.3);
        display: flex;
        flex-direction: column;
        font-family: "Courier New", monospace;
        color: #0ff;
        font-size: 12px;
        z-index: 100;
        transition: width 0.2s ease;
      }

      #gizmo-list-panel.collapsed {
        width: 48px;
      }

      #gizmo-list-panel .header {
        padding: 10px;
        border-bottom: 1px solid rgba(0, 255, 231, 0.2);
        font-weight: bold;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
        color: #0ff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      #gizmo-list-title {
        white-space: nowrap;
      }

      #gizmo-list-toggle {
        border: 1px solid rgba(0, 255, 231, 0.5);
        background: rgba(0, 255, 231, 0.1);
        color: #0ff;
        border-radius: 4px;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }

      #gizmo-list {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .gizmo-item {
        padding: 5px 8px;
        min-height: 0;
        background: rgba(0, 100, 150, 0.3);
        border: 1px solid rgba(0, 255, 231, 0.2);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
        user-select: none;
        font-size: 12px;
        line-height: 1.2;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .gizmo-item:hover {
        background: rgba(0, 150, 200, 0.5);
        border-color: rgba(0, 255, 231, 0.6);
        box-shadow: 0 0 10px rgba(0, 255, 231, 0.3);
      }

      .gizmo-item.selected {
        background: rgba(0, 200, 255, 0.6);
        border-color: rgba(0, 255, 231, 0.9);
        box-shadow: 0 0 15px rgba(0, 255, 231, 0.5);
      }

      #aquarium-controls-btn {
        padding: 10px;
        margin: 8px;
        background: rgba(255, 68, 170, 0.2);
        border: 1px solid rgba(255, 68, 170, 0.5);
        color: #ff44aa;
        font-family: "Courier New", monospace;
        font-size: 11px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.2s ease;
      }

      #gizmo-list-panel.collapsed #gizmo-list,
      #gizmo-list-panel.collapsed #aquarium-controls-btn,
      #gizmo-list-panel.collapsed #gizmo-list-title {
        display: none;
      }

      #gizmo-list-panel.collapsed .header {
        justify-content: center;
        padding: 10px 6px;
      }

      #aquarium-controls-btn:hover {
        background: rgba(255, 68, 170, 0.4);
        border-color: rgba(255, 68, 170, 0.8);
        box-shadow: 0 0 10px rgba(255, 68, 170, 0.3);
      }

      /* Scrollbar styling */
      #gizmo-list::-webkit-scrollbar {
        width: 8px;
      }

      #gizmo-list::-webkit-scrollbar-track {
        background: rgba(0, 255, 231, 0.05);
      }

      #gizmo-list::-webkit-scrollbar-thumb {
        background: rgba(0, 255, 231, 0.3);
        border-radius: 4px;
      }

      #gizmo-list::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 255, 231, 0.6);
      }

      /* ── Hall of Fame Panel ───────────────────────────────────────────────── */
      #hof-panel {
        position: fixed;
        right: 0;
        top: 0;
        width: 200px;
        height: 100vh;
        background: rgba(10, 20, 40, 0.95);
        border-left: 2px solid rgba(255, 200, 50, 0.35);
        display: flex;
        flex-direction: column;
        font-family: "Courier New", monospace;
        color: #ffd700;
        font-size: 12px;
        z-index: 100;
        transition: width 0.2s ease;
      }

      #hof-panel.collapsed {
        width: 32px;
      }

      #hof-panel .hof-header {
        padding: 10px;
        border-bottom: 1px solid rgba(255, 200, 50, 0.2);
        font-weight: bold;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 1px;
        color: #ffd700;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        white-space: nowrap;
      }

      #hof-panel-toggle {
        border: 1px solid rgba(255, 200, 50, 0.5);
        background: rgba(255, 200, 50, 0.1);
        color: #ffd700;
        border-radius: 4px;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
        flex-shrink: 0;
      }

      #hof-panel.collapsed .hof-body,
      #hof-panel.collapsed .hof-title {
        display: none;
      }

      #hof-panel.collapsed .hof-header {
        justify-content: center;
        padding: 10px 4px;
      }

      .hof-body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 6px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .hof-section-title {
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(255, 215, 0, 0.6);
        padding-bottom: 4px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.15);
        margin-bottom: 2px;
      }

      .hof-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 6px;
        background: rgba(255, 200, 50, 0.07);
        border: 1px solid rgba(255, 200, 50, 0.15);
        border-radius: 5px;
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
      }

      .hof-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.3);
      }

      .hof-id {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #ffe87c;
        font-size: 10px;
      }

      .hof-score {
        color: #fff;
        font-weight: bold;
        font-size: 10px;
        flex-shrink: 0;
      }

      .hof-empty {
        color: rgba(255, 215, 0, 0.3);
        font-size: 11px;
        text-align: center;
        padding: 4px;
      }

      .hof-body::-webkit-scrollbar { width: 6px; }
      .hof-body::-webkit-scrollbar-track { background: transparent; }
      .hof-body::-webkit-scrollbar-thumb {
        background: rgba(255, 200, 50, 0.3);
        border-radius: 3px;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-CrAee-gM.js"></script>
  </head>
  <body>
    <div id="gizmo-list-panel">
      <div class="header">
        <span id="gizmo-list-title">Gizmos</span>
        <button id="gizmo-list-toggle" aria-label="Colapsar lista">◀</button>
      </div>
      <div id="gizmo-list" class="list"></div>
      <button id="aquarium-controls-btn">Aquarium Controls</button>
    </div>

    <div id="hof-panel" class="collapsed">
      <div class="hof-header">
        <span class="hof-title">🏆 Hall of Fame</span>
        <button id="hof-panel-toggle" aria-label="Expandir HoF">▶</button>
      </div>
      <div class="hof-body">
        <div>
          <div class="hof-section-title">🌿 Herbivores</div>
          <div id="hof-herb-list"><div class="hof-empty">—</div></div>
        </div>
        <div>
          <div class="hof-section-title">🔴 Carnivores</div>
          <div id="hof-carn-list"><div class="hof-empty">—</div></div>
        </div>
      </div>
    </div>

  </body>
</html>
